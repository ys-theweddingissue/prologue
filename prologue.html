<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories | Wedding Special</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&family=Noto+Serif+JP:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f9f7f2;
            --text-color: #4a4238;
            --accent-color: #a68b6d;
            --font-en: 'Lato', sans-serif;
            --font-jp: 'Noto Serif JP', serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            color: var(--text-color);
            font-family: var(--font-jp);
        }

        nav {
            position: fixed; top: 0; width: 100%; padding: 30px 50px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; background: rgba(249, 247, 242, 0.9);
        }
        .logo { font-family: var(--font-en); font-size: 1.2rem; letter-spacing: 0.2em; text-transform: uppercase; }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--text-color); font-family: var(--font-en); font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; }

        .container { max-width: 1400px; margin: 0 auto; padding: 150px 20px 100px; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            aspect-ratio: 1;
        }
        .gallery-item.wide { grid-column: span 2; aspect-ratio: 2/1; }
        .gallery-item.tall { grid-row: span 2; aspect-ratio: 1/2; }

        .gallery-item img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(100%);
            transition: 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .gallery-item:hover img { filter: grayscale(0%); transform: scale(1.05); }

        .gallery-item::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(74, 66, 56, 0.2);
            opacity: 0; transition: 0.5s;
        }
        .gallery-item:hover::after { opacity: 1; }

        .fade-in { opacity: 0; transform: translateY(30px); transition: 1s ease; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }

        @media (max-width: 768px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .gallery-item.wide, .gallery-item.tall { grid-column: auto; grid-row: auto; aspect-ratio: 1; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">K & M</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="story.html">Story</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="memories.html">Memories</a></li>
            <li><a href="message.html">Message</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="gallery-grid">
            <div class="gallery-item fade-in">
                <img src="https://images.unsplash.com/photo-1518196775791-2e1966a4091b?auto=format&fit=crop&q=80&w=800" alt="Mem 1">
            </div>
            <div class="gallery-item wide fade-in">
                <img src="https://images.unsplash.com/photo-1473177104440-ffee2f376098?auto=format&fit=crop&q=80&w=1200" alt="Mem 2">
            </div>
            <div class="gallery-item tall fade-in">
                <img src="https://images.unsplash.com/photo-1522673607200-16488354435b?auto=format&fit=crop&q=80&w=800" alt="Mem 3">
            </div>
            <div class="gallery-item fade-in">
                <img src="https://images.unsplash.com/photo-1520854221256-17451cc331bf?auto=format&fit=crop&q=80&w=800" alt="Mem 4">
            </div>
            <div class="gallery-item fade-in">
                <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&q=80&w=800" alt="Mem 5">
            </div>
            <div class="gallery-item wide fade-in">
                <img src="https://images.unsplash.com/photo-1470246973918-29a93221c455?auto=format&fit=crop&q=80&w=1200" alt="Mem 6">
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('visible');
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
