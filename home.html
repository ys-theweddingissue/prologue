<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Beginning of Our Story | Wedding Special</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&family=Noto+Serif+JP:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f9f7f2;
            --text-color: #4a4238;
            --accent-color: #a68b6d;
            --white: #ffffff;
            --font-en: 'Lato', sans-serif;
            --font-jp: 'Noto Serif JP', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png'); /* 控えめな木目 */
            color: var(--text-color);
            font-family: var(--font-jp);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(249, 247, 242, 0.8), transparent);
        }

        .logo {
            font-family: var(--font-en);
            font-size: 1.2rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-color);
            font-family: var(--font-en);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0 10%;
        }

        .hero-content {
            text-align: center;
            z-index: 2;
        }

        .hero-image-wrap {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 80%;
            z-index: 1;
            overflow: hidden;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: filter 1.5s ease;
            opacity: 0.8;
        }

        .hero:hover .hero-image {
            filter: grayscale(0%);
        }

        .hero-title {
            font-family: var(--font-en);
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 300;
            line-height: 1;
            margin-bottom: 20px;
            color: var(--white);
            text-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .hero-subtitle {
            font-size: 0.9rem;
            letter-spacing: 0.5em;
            color: var(--white);
            text-transform: uppercase;
        }

        /* --- Scroll Animation --- */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s ease, transform 1s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Footer/Message --- */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-en);
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            writing-mode: vertical-rl;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0) translateX(-50%);}
            40% {transform: translateY(-10px) translateX(-50%);}
            60% {transform: translateY(-5px) translateX(-50%);}
        }

        @media (max-width: 768px) {
            nav { padding: 20px; }
            .nav-links { display: none; } /* シンプル化のためスマホでは非表示 */
            .hero-image-wrap { width: 90%; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">K & M</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="history.html">Story</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="gallery.html">Memories</a></li>
            <li><a href="contact.html">Message</a></li>
        </ul>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-image-wrap">
                <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&q=80&w=2000" alt="Wedding Main" class="hero-image">
            </div>
            <div class="hero-content fade-in" id="heroContent">
                <h1 class="hero-title">Eternal<br>Moments</h1>
                <p class="hero-subtitle">2025.10.24 — Wedding Celebration</p>
            </div>
            <div class="scroll-hint">SCROLL</div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
