<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME | K & M Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&family=Noto+Serif+JP:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f9f7f2;
            --text-color: #4a4238;
            --accent-color: #a68b6d;
            --white: #ffffff;
            --font-en: 'Lato', sans-serif;
            --font-jp: 'Noto Serif JP', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg-color);
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            color: var(--text-color);
            font-family: var(--font-jp);
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 25px;
            display: flex; justify-content: space-between; align-items: center; z-index: 2000;
        }
        .menu-trigger {
            font-family: var(--font-en); font-size: 1.1rem; letter-spacing: 0.2em;
            cursor: pointer; background: none; border: none; color: var(--text-color);
            display: flex; align-items: center; gap: 10px;
        }
        .menu-icon { width: 24px; height: 14px; position: relative; }
        .menu-icon span { position: absolute; width: 100%; height: 1px; background: var(--text-color); left: 0; transition: 0.3s; }
        .menu-icon span:nth-child(1) { top: 0; }
        .menu-icon span:nth-child(2) { bottom: 0; }

        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 3000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: 0.5s;
        }
        .menu-overlay.active { opacity: 1; visibility: visible; }
        .nav-list { list-style: none; text-align: center; }
        .nav-list li { margin: 25px 0; }
        .nav-list a {
            text-decoration: none; color: var(--text-color); font-family: var(--font-en);
            font-size: 1.4rem; letter-spacing: 0.1em; display: block;
        }
        .nav-list span { display: block; font-size: 0.6rem; font-family: var(--font-jp); color: var(--accent-color); margin-top: 4px; }

        /* --- Home Specific --- */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; text-align: center; padding: 0 20px;
        }
        .hero-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; filter: grayscale(100%) brightness(0.7);
            z-index: -1;
        }
        .hero-content { color: var(--white); }
        .hero-en { font-family: var(--font-en); font-size: 3.5rem; font-weight: 300; letter-spacing: 0.1em; margin-bottom: 10px; }
        .hero-jp { font-size: 0.8rem; letter-spacing: 0.4em; margin-bottom: 30px; }
        .hero-date { font-family: var(--font-en); font-size: 1.1rem; letter-spacing: 0.2em; border-top: 1px solid rgba(255,255,255,0.5); border-bottom: 1px solid rgba(255,255,255,0.5); padding: 10px 20px; display: inline-block; }

        .scroll-hint {
            position: absolute; bottom: 30px; color: var(--white);
            font-size: 0.7rem; font-family: var(--font-en); letter-spacing: 0.3em;
            writing-mode: vertical-rl; animation: bounce 2s infinite;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }

    </style>
</head>
<body>
    <nav>
        <button class="menu-trigger" onclick="toggleMenu()">
            <div class="menu-icon"><span></span><span></span></div>
            <span>K & M</span>
        </button>
    </nav>

    <div class="menu-overlay" id="menuOverlay">
        <div style="position:absolute; top:25px; left:25px; cursor:pointer;" onclick="toggleMenu()">CLOSE —</div>
        <ul class="nav-list">
            <li><a href="index.html">HOME<span>ホーム</span></a></li>
            <li><a href="prologue.html">PROLOGUE<span>感謝の気持ち</span></a></li>
            <li><a href="profile.html">PROFILE<span>新郎新婦紹介</span></a></li>
            <li><a href="story.html">OUR STORY<span>二人の歩み</span></a></li>
            <li><a href="seating.html">SEATING GUIDE<span>お席案内</span></a></li>
            <li><a href="cuisine.html">CUISINE<span>お料理</span></a></li>
            <li><a href="memories.html">SPECIAL MEMORIES<span>あなたへの手紙</span></a></li>
        </ul>
    </div>

    <main class="hero">
        <img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&q=80&w=1200" alt="Home Background" class="hero-img">
        <div class="hero-content">
            <h1 class="hero-en">The Wedding</h1>
            <p class="hero-jp">二人の新しい門出</p>
            <div class="hero-date">2025.10.24</div>
        </div>
        <div class="scroll-hint">SCROLL</div>
    </main>

    <script>
        function toggleMenu() { document.getElementById('menuOverlay').classList.toggle('active'); }
    </script>
</body>
</html>
