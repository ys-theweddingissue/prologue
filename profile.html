<!DOCTYPE html>

<head>

    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&family=Noto+Serif+JP:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #f9f7f2; --text-color: #4a4238; --accent-color: #a68b6d; --font-en: 'Lato', sans-serif; --font-jp: 'Noto Serif JP', serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png'); color: var(--text-color); font-family: var(--font-jp); }
        
        nav { position: fixed; top: 0; width: 100%; padding: 25px; display: flex; align-items: center; z-index: 2000; }
        .menu-trigger { font-family: var(--font-en); font-size: 1.1rem; letter-spacing: 0.2em; cursor: pointer; background: none; border: none; color: var(--text-color); display: flex; align-items: center; gap: 10px; }
        .menu-icon { width: 24px; height: 14px; position: relative; }
        .menu-icon span { position: absolute; width: 100%; height: 1px; background: var(--text-color); left: 0; }
        .menu-icon span:nth-child(1) { top: 0; } .menu-icon span:nth-child(2) { bottom: 0; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.5s; }
        .menu-overlay.active { opacity: 1; visibility: visible; }
        .nav-list { list-style: none; text-align: center; } .nav-list li { margin: 25px 0; } .nav-list a { text-decoration: none; color: var(--text-color); font-family: var(--font-en); font-size: 1.4rem; }
        .nav-list span { display: block; font-size: 0.6rem; font-family: var(--font-jp); color: var(--accent-color); }

        .container { padding: 120px 20px 60px; }
        .profile-section { margin-bottom: 80px; text-align: center; }
        .photo-wrap { width: 80%; margin: 0 auto 30px; aspect-ratio: 3/4; overflow: hidden; box-shadow: 10px 10px 0 var(--accent-color); }
        .photo-wrap img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); }
        .role { font-family: var(--font-en); font-size: 0.7rem; letter-spacing: 0.4em; color: var(--accent-color); text-transform: uppercase; }
        .name { font-size: 1.8rem; margin: 10px 0 20px; }
        .bio { text-align: left; font-size: 0.9rem; line-height: 2; padding: 0 10%; }
        .bio dt { color: #999; font-size: 0.7rem; margin-top: 10px; }
    </style>
</head>
<body>

            <p class="role">Groom</p>

            <p class="role">Bride</p>

</body>
</html>
